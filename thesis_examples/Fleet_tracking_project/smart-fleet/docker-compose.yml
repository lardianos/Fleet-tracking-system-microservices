services:
  device-gateway:
    build:
      context: ./device-gateway
      dockerfile: Dockerfile
    container_name: device-gateway
    environment:
      GATEWAY_HOST: 0.0.0.0
      GATEWAY_PORT: 7494
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_TOPIC_TELEMETRY: telemetry.positions
    ports:
      - "7494:7494"
    depends_on:
      - kafka
    restart: unless-stopped

  teltonika-simulator:
    image: python:3.11-slim
    container_name: teltonika-simulator
    working_dir: /app
    volumes:
      - ./simulator:/app
    command: >
      sh -c "python teltonika_simulator.py --host device-gateway --port 7494 --imei 123456789012345 --interval 5"
    depends_on:
      - device-gateway

  fleet-api:
    build:
      context: fleet-api
      dockerfile: Dockerfile
    container_name: fleet-api
    ports:
      - "8000:8000"
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_TOPIC_FLEET_VEHICLES: fleet.vehicles
      MONGO_HOST: mongodb
      MONGO_PORT: 27017
      MONGO_USER: fleet_admin
      MONGO_PASSWORD: fleet_password
      MONGO_DB: fleet_tracking
    depends_on:
      - mongodb
      - kafka
    restart: unless-stopped

  position-processor:
    build:
      context: position-processor
      dockerfile: Dockerfile
    container_name: position-processor
    environment:
      TIMESCALE_HOST: timescaledb
      TIMESCALE_PORT: 5432
      TIMESCALE_DB: fleet_tracking
      TIMESCALE_USER: fleet_user
      TIMESCALE_PASSWORD: fleet_password
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_TOPIC_TELEMETRY: telemetry.positions
      KAFKA_CONSUMER_GROUP: position-processor-group
      REDIS_HOST: redis
      REDIS_PORT: 6379
    depends_on:
      - kafka
      - redis
      - timescaledb
    restart: unless-stopped

  kafka:
    image: apache/kafka:4.2.0
    container_name: kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_TOPIC_FLEET_VEHICLES: fleet.vehicles

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui
    ports:
      - "8080:8080"
    depends_on:
      - kafka
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092

  redis:
    image: redis:7-alpine
    container_name: redis
    ports:
      - "6379:6379"
    restart: unless-stopped

  timescaledb:
    image: timescale/timescaledb:latest-pg16
    container_name: timescaledb
    environment:
      POSTGRES_DB: fleet_tracking
      POSTGRES_USER: fleet_user
      POSTGRES_PASSWORD: fleet_password
    ports:
      - "5432:5432"
    volumes:
      - timescale_data:/var/lib/postgresql/data
      - ./database/init:/docker-entrypoint-initdb.d

    restart: unless-stopped

  mongodb:
    image: mongo:7
    container_name: mongodb
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: fleet_admin
      MONGO_INITDB_ROOT_PASSWORD: fleet_password
    volumes:
      - mongo_data:/data/db
    restart: unless-stopped

volumes:
  kafka_data:
  timescale_data:
  mongo_data: